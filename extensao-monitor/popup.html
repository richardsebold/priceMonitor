<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Cadastrar Produto</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="title-row">
        <span class="title-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.25"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M5 12h14" />
            <path d="M12 5v14" />
          </svg>
        </span>
        <h1 class="title">Cadastrar Produto</h1>
      </div>
      <p class="subtitle">Adicione o produto da aba atual ao seu painel.</p>
    </header>

    <main class="content">
      <div class="field">
        <label class="label" for="url">URL do produto</label>
        <input
          id="url"
          class="input input-mono"
          type="text"
          readonly
          aria-readonly="true"
        />
      </div>

      <div class="field">
        <label class="label" for="priceTarget">
          Valor desejado
          <span class="label-required" aria-hidden="true">*</span>
        </label>
        <input
          id="priceTarget"
          class="input"
          type="number"
          inputmode="decimal"
          min="0"
          step="0.01"
          placeholder="Insira o valor desejado"
          required
        />
      </div>

      <button class="btn-primary" id="addBtn" type="button">
        <span class="btn-icon" id="btnIcon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M5 12h14" />
            <path d="M12 5v14" />
          </svg>
        </span>
        <span class="btn-text" id="btnText">Cadastrar</span>
      </button>

      <p class="status" id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
